<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Caixa</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
}

h1{
    color:#8b3a62;
}

table{
    margin:auto;
    background:white;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border:1px solid #ccc;
}

.total{
    background:white;
    width:300px;
    margin:20px auto;
    padding:15px;
    border-radius:10px;
}

</style>

</head>


<body>


<h1>Controle de Caixa</h1>


<div class="total">

<h2>
Total:
R$ {{ "%.2f"|format(total) }}
</h2>

</div>


<table>

<tr>

<th>Cliente</th>
<th>Serviço</th>
<th>Valor</th>
<th>Pagamento</th>
<th>Data</th>

</tr>


{% for c in registros %}

<tr>

<td>{{c.cliente}}</td>

<td>{{c.servico}}</td>

<td>
R$ {{ "%.2f"|format(c.valor) }}
</td>

<td>{{c.pagamento}}</td>

<td>{{c.data}}</td>

</tr>

{% endfor %}


</table>


</body>

</html>
