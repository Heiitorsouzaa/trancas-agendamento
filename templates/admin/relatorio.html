<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Relatório</title>


<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
}


.card{

    display:inline-block;
    background:white;
    padding:20px;
    margin:10px;
    border-radius:10px;
    width:200px;

}


table{

    margin:auto;
    background:white;
    border-collapse:collapse;

}


td,th{

    padding:10px;
    border:1px solid #ccc;

}

</style>


</head>


<body>


<h1>Relatório do Salão</h1>


<div class="card">

<h2>{{total}}</h2>

<p>Agendamentos</p>

</div>


<div class="card">

<h2>{{clientes_total}}</h2>

<p>Clientes</p>

</div>


<div class="card">

<h2>{{funcionarios_total}}</h2>

<p>Funcionários</p>

</div>


<div class="card">

<h2>
R$ {{ "%.2f"|format(faturamento) }}
</h2>

<p>Faturamento</p>

</div>



<h2>Serviços realizados</h2>


<table>


<tr>

<th>Serviço</th>
<th>Quantidade</th>

</tr>


{% for nome, quantidade in servicos.items() %}

<tr>

<td>{{nome}}</td>

<td>{{quantidade}}</td>

</tr>

{% endfor %}


</table>



</body>

</html>
