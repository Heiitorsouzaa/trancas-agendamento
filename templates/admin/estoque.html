{% extends "base.html" %}


{% block conteudo %}

<h2>
Controle de Estoque
</h2>


<table>

<tr>
<th>Produto</th>
<th>Categoria</th>
<th>Quantidade</th>
<th>Valor</th>
</tr>


{% for item in produtos %}

<tr>

<td>
{{ item.produto }}
</td>

<td>
{{ item.categoria }}
</td>

<td>
{{ item.quantidade }}
</td>

<td>
R$ {{ item.valor }}
</td>

</tr>

{% endfor %}


</table>


{% endblock %}
