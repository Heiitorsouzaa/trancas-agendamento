<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Estoque</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
        }

        form{
            background:white;
            width:350px;
            margin:20px auto;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:90%;
            padding:10px;
            margin:5px;
        }

        button{
            background:#8b3a62;
            color:white;
            padding:10px;
            border:none;
            border-radius:8px;
        }

        table{
            margin:auto;
            background:white;
            border-collapse:collapse;
        }

        td, th{
            padding:10px;
            border:1px solid #ccc;
        }

    </style>

</head>


<body>


<h1>Controle de Estoque</h1>


<form method="POST">

<input 
name="produto"
placeholder="Nome do produto"
required>


<input 
name="quantidade"
type="number"
placeholder="Quantidade"
required>


<input 
name="minimo"
type="number"
placeholder="Quantidade mínima"
required>


<input 
name="valor"
type="number"
step="0.01"
placeholder="Valor"
required>


<button>
Cadastrar
</button>


</form>



<h2>Produtos cadastrados</h2>


<table>

<tr>

<th>Produto</th>
<th>Quantidade</th>
<th>Mínimo</th>
<th>Valor</th>

</tr>


{% for p in produtos %}

<tr>

<td>{{p.produto}}</td>

<td>{{p.quantidade}}</td>

<td>{{p.minimo}}</td>

<td>R$ {{p.valor}}</td>

</tr>

{% endfor %}


</table>


</body>

</html>
