<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>
Tranças Agendamento
</title>


<style>

body{

    font-family: Arial;

    background:#f5f5f5;

    margin:0;

}


header{

    background:#8b3a62;

    color:white;

    padding:15px;

    text-align:center;

}


nav{

    background:white;

    padding:15px;

    text-align:center;

}


nav a{

    text-decoration:none;

    margin:10px;

    color:#8b3a62;

    font-weight:bold;

}


.container{

    padding:30px;

}


button,
.botao{

    background:#8b3a62;

    color:white;

    padding:10px 20px;

    border:none;

    border-radius:5px;

    text-decoration:none;

    cursor:pointer;

}


.cards{

    display:flex;

    gap:20px;

    justify-content:center;

}


.card{

    background:white;

    padding:20px;

    width:150px;

    text-align:center;

    border-radius:10px;

}


table{

    width:90%;

    margin:auto;

    background:white;

    border-collapse:collapse;

}


th, td{

    border:1px solid #ccc;

    padding:10px;

}



input,
select,
textarea{

    padding:10px;

    width:250px;

}


</style>


</head>


<body>



<header>

<h1>
Tranças Agendamento
</h1>

</header>



<nav>


<a href="/">
Início
</a>



<a href="/admin">
Admin
</a>



<a href="/agendamento">
Agendamento
</a>



<a href="{{ url_for('estoque') }}">
Estoque
</a>



<a href="/logout">
Sair
</a>



</nav>




<div class="container">


{% with mensagens = get_flashed_messages(with_categories=true) %}

{% if mensagens %}

{% for categoria, mensagem in mensagens %}


<p>
{{ mensagem }}
</p>


{% endfor %}

{% endif %}

{% endwith %}



{% block conteudo %}

{% endblock %}



</div>



</body>

</html>
